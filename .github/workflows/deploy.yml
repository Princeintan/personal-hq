name: Deploy Personal HQ to Pages

on:
  push:
    branches: ["main"] # Triggers automatically whenever you push to main
  workflow_dispatch: # Allows you to manually trigger a deploy from the GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # This uploads the entire root directory.
          # Later, if you use a build step (like Vite/Webpack), you'll change this to 'dist' or 'build'
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
